version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: notesapp-db
    environment:
      POSTGRES_DB: notesapp
      POSTGRES_USER: notesapp
      POSTGRES_PASSWORD: notesapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
