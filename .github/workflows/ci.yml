name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend unit + integration tests ────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests (TestContainers needs Docker)
        working-directory: backend
        run: ./mvnw test
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watch=false

      - name: Build production bundle
        working-directory: frontend
        run: npm run build -- --configuration=production

  # ── Docker build smoke test ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t notesapp-backend ./backend

      - name: Build frontend image
        run: docker build -t notesapp-frontend ./frontend

  # ── E2E tests (full stack via Docker Compose) ────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    # Only run on pushes to main (not every PR) to keep CI fast
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d --build
          echo "Waiting for frontend to be healthy..."
        env:
          JWT_SECRET: ci-test-secret-must-be-at-least-256-bits-long-for-hs256-algorithm

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/login > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              break
            fi
            echo "Waiting... ($i)"
            sleep 5
          done

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npm test
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
