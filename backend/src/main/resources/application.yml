spring:
  application:
    name: notesapp
  datasource:
    url: jdbc:postgresql://localhost:5432/notesapp
    username: notesapp
    password: notesapp
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: notesapp-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 900000       # 15 minutes in ms
  refresh-token-expiration: 604800000   # 7 days in ms
